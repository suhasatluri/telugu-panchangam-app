name: 🐛 Bug report
description: Something in the app is broken or behaving unexpectedly.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        **Before you start:** if this is about a specific date or festival
        being wrong, please use the **Festival / Panchangam correction**
        template instead — it has fields specifically for the date, city
        and reference source.
  - type: input
    id: page
    attributes:
      label: Page or feature
      description: Which page or feature were you using?
      placeholder: "/2026/4/2 day detail, /reminders, /festivals, etc."
    validations:
      required: true
  - type: input
    id: city
    attributes:
      label: City selected in the app
      placeholder: "Melbourne, Hyderabad, etc."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: What actually happened?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to /...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: dropdown
    id: device
    attributes:
      label: Device type
      options:
        - Mobile (Android)
        - Mobile (iPhone)
        - Tablet
        - Desktop
    validations:
      required: true
  - type: input
    id: browser
    attributes:
      label: Browser + version (if known)
      placeholder: "Chrome 120, Safari 17, Firefox 121, ..."
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag and drop screenshots here (optional but very helpful).
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      options:
        - label: I agree to follow this project's [Code of Conduct](../CODE_OF_CONDUCT.md)
          required: true
